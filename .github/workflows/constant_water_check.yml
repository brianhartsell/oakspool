name: Short Timeline Checks (Flume Constant Water)

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes UTC
  workflow_dispatch:

jobs:
  check-constant-water:
    runs-on: ubuntu-latest

    env:
      FLUME_USERNAME: ${{ secrets.FLUME_USERNAME }}
      FLUME_PASSWORD: ${{ secrets.FLUME_PASSWORD }}
      FLUME_CLIENT_ID: ${{ secrets.FLUME_CLIENT_ID }}
      FLUME_CLIENT_SECRET: ${{ secrets.FLUME_CLIENT_SECRET }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
      SLACK_HEARTBEAT_CHANNEL: ${{ secrets.SLACK_HEARTBEAT_CHANNEL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv tzlocal

      - name: Run Flume constant water check
        run: python flume_constant_water_check.py

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-type: application/json" \
            -d "{\"channel\": \"$SLACK_CHANNEL\", \"text\": \"🚨 *Constant water check failed* — leak detection is offline\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View failed run>\"}"

