name: Pull Flume Usage Data

on:
  schedule:
    - cron: '0 4 * * *'  # 11 PM CDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    env:
      FLUME_USERNAME:    ${{ secrets.FLUME_USERNAME }}
      FLUME_PASSWORD:    ${{ secrets.FLUME_PASSWORD }}
      FLUME_CLIENT_ID:   ${{ secrets.FLUME_CLIENT_ID }}
      FLUME_CLIENT_SECRET: ${{ secrets.FLUME_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz python-dotenv

      - name: Pull Flume data
        run: python pull_flume.py

      - name: Commit log
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git add logs/flume_usage_log.csv
          if git diff --cached --quiet; then
            echo "No new data."
            exit 0
          fi
          git commit -m "Flume data pull $(date '+%Y-%m-%d')"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-type: application/json" \
            -d "{\"channel\":\"${{ secrets.SLACK_CHANNEL }}\",\"text\":\"❌ *Flume pull failed*\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
