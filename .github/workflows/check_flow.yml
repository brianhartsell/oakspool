name: Flume Continuous Flow Check

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FLUME_USERNAME:      ${{ secrets.FLUME_USERNAME }}
      FLUME_PASSWORD:      ${{ secrets.FLUME_PASSWORD }}
      FLUME_CLIENT_ID:     ${{ secrets.FLUME_CLIENT_ID }}
      FLUME_CLIENT_SECRET: ${{ secrets.FLUME_CLIENT_SECRET }}
      SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL:       ${{ secrets.SLACK_CHANNEL }}
      SLACK_HEARTBEAT_CHANNEL: ${{ secrets.SLACK_HEARTBEAT_CHANNEL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run flow check
        run: python check_flow.py

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-type: application/json" \
            -d "{\"channel\":\"${{ secrets.SLACK_CHANNEL }}\",\"text\":\"🚨 *Continuous flow check failed* — leak detection is offline\n<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>\"}"
