name: Cleanup old flow images

on:
  schedule:
    - cron: '0 3 * * *'  # runs daily at 3am
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Delete flow images older than 7 days
        run: |
          git config user.name  github-actions
          git config user.email github-actions@github.com

          CUTOFF=$(date -d '7 days ago' +%s)
          DELETED=0

          for f in flowimages/flow_*.jpg; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            file_date=$(echo "$fname" | grep -oP '\d{4}-\d{2}-\d{2}')
            [ -z "$file_date" ] && continue
            FILE_TS=$(date -d "$file_date" +%s 2>/dev/null) || continue
            if [ "$FILE_TS" -lt "$CUTOFF" ]; then
              echo "Deleting $fname ($file_date)"
              git rm "$f"
              DELETED=$((DELETED + 1))
            fi
          done

          if [ "$DELETED" -eq 0 ]; then
            echo "Nothing to clean up."
            exit 0
          fi

          git commit -m "Cleanup $DELETED flow image(s) older than 7 days"

      - name: Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD
