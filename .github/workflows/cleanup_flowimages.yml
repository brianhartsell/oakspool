# .github/workflows/cleanup_flowimages.yml
name: Cleanup old flow images

on:
  schedule:
    - cron: '0 3 * * *'  # runs daily at 3am
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete flow images older than 7 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CUTOFF=$(date -d '7 days ago' +%s)
          
          gh api repos/${{ github.repository }}/contents/flowimages \
            --jq '.[] | select(.type == "file") | .name + " " + .sha' | \
          while read name sha; do
            # Get commit date for this file
            FILE_DATE=$(gh api "repos/${{ github.repository }}/commits?path=flowimages/$name&per_page=1" \
              --jq '.[0].commit.committer.date' | xargs -I{} date -d {} +%s)
            
            if [ "$FILE_DATE" -lt "$CUTOFF" ]; then
              echo "Deleting $name"
              gh api repos/${{ github.repository }}/contents/flowimages/$name \
                -X DELETE \
                -f message="cleanup $name" \
                -f sha=$sha
            fi
          done
